services:
  api-gw:
    build: ../..
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: "test"
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-10}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MONGO_HOST: ${MONGO_HOST}
      CONFIGURATION_PROVIDER: ${CONFIGURATION_PROVIDER:-FILE}
      MOUNTED_DIRECTORY: ${MOUNTED_DIRECTORY:-/var/lib/api-gw/configuration}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_ADMIN_CLIENT_ID: ${GOOGLE_ADMIN_CLIENT_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      GW_AUTHORIZATION_SECRET: ${GW_AUTHORIZATION_SECRET}
      OAUTH_USER_RESOURCE_URL: ${OAUTH_USER_RESOURCE_URL:-user-resource-service:80}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/gw/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - staging-network
      - coolify

networks:
  staging-network:
    external: true
  coolify:
    external: true
